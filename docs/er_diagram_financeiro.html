<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modelo Entidade Relacionamento — FinanceiroApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --doc-accent: #1976D2;
      --doc-accent-rgb: 25, 118, 210;
    }
    [data-bs-theme="dark"] {
      --doc-accent: #64B5F6;
      --doc-accent-rgb: 100, 181, 246;
    }
    body {
      min-height: 100vh;
      transition: background-color .3s, color .3s;
    }
    .hero-gradient {
      background: linear-gradient(135deg, rgba(var(--doc-accent-rgb), .08) 0%, rgba(var(--doc-accent-rgb), .02) 100%);
      border-bottom: 1px solid var(--bs-border-color);
    }
    .card-erd {
      border: 1px solid var(--bs-border-color);
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    }
    [data-bs-theme="dark"] .card-erd {
      box-shadow: 0 1px 3px rgba(0,0,0,.2), 0 4px 12px rgba(0,0,0,.15);
    }
    .card-erd .card-header {
      background: transparent;
      border-bottom: 1px solid var(--bs-border-color);
    }
    #erd { padding: 2rem; }
    #erd svg { max-width: 100%; height: auto; }
    .badge-version { font-size: .75rem; letter-spacing: .03em; }
    .theme-toggle {
      border: 1px solid var(--bs-border-color);
      border-radius: .5rem;
      padding: .35rem .75rem;
      background: transparent;
      color: var(--bs-body-color);
      cursor: pointer;
      transition: all .15s;
    }
    .theme-toggle:hover {
      background: rgba(var(--doc-accent-rgb), .1);
      border-color: var(--doc-accent);
    }
  </style>
</head>
<body>
  <div class="hero-gradient py-4 mb-4">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between">
        <div>
          <h4 class="mb-1 fw-semibold">
            <i class="bi bi-diagram-3 me-2" style="color:var(--doc-accent)"></i>Modelo Entidade Relacionamento
          </h4>
          <p class="text-secondary mb-0 small">FinanceiroApp — Diagrama de Banco de Dados</p>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Alternar tema">
          <i class="bi bi-circle-half" id="themeIcon"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="container pb-5">
    <div class="card card-erd">
      <div class="card-header d-flex align-items-center justify-content-between py-3 px-4">
        <h6 class="mb-0 font-monospace fw-medium">
          <i class="bi bi-database me-1"></i>ER Diagram
        </h6>
        <span class="badge bg-body-secondary badge-version font-monospace">Mermaid v11</span>
      </div>
      <div class="card-body bg-body-tertiary p-0">
        <div id="erd" class="d-flex justify-content-center"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';

    const dark = document.documentElement.dataset.bsTheme === 'dark';
    await document.fonts.ready;

    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      fontFamily: 'var(--bs-font-sans-serif)',
      themeVariables: {
        darkMode: dark,
        fontSize: '13px',
        fontFamily: 'var(--bs-font-sans-serif)',
        lineColor: dark ? '#6c757d' : '#495057',
        textColor: dark ? '#f8f9fa' : '#212529',
        mainBkg: dark ? '#212529' : '#ffffff',
        nodeBorder: dark ? '#495057' : '#dee2e6',
        primaryColor: dark ? '#343a40' : '#f8f9fa',
        primaryTextColor: dark ? '#64B5F6' : '#0a58ca',
        rowRectOdd: dark ? '#2b3035' : '#ffffff',
        rowRectEven: dark ? '#212529' : '#f8f9fa',
        edgeLabelBackground: dark ? '#191c1f' : '#ffffff',
        labelTextColor: dark ? '#adb5bd' : '#6c757d'
      },
    });

    const { svg } = await mermaid.render('erd-svg', `erDiagram
      USUARIOS ||--o{ CONTAS : possui
      USUARIOS ||--o{ CATEGORIAS : cria
      CONTAS ||--o{ TRANSACOES : contem
      CATEGORIAS ||--o{ TRANSACOES : classifica
      CONTAS ||--o{ ORCAMENTOS : associa
      CATEGORIAS ||--o{ ORCAMENTOS : define

      USUARIOS {
        uuid id PK
        string nome
        string email
        string senha_hash
        timestamp criado_em
      }
      CONTAS {
        uuid id PK
        uuid usuario_id FK
        string nome
        string tipo
        decimal saldo_inicial
        decimal saldo_atual
        string moeda
        boolean ativa
      }
      CATEGORIAS {
        uuid id PK
        uuid usuario_id FK
        string nome
        string tipo
        string cor
        string icone
      }
      TRANSACOES {
        uuid id PK
        uuid conta_id FK
        uuid categoria_id FK
        decimal valor
        string tipo
        string descricao
        date data
        string status
        timestamp criado_em
      }
      ORCAMENTOS {
        uuid id PK
        uuid conta_id FK
        uuid categoria_id FK
        decimal valor_limite
        date mes_referencia
        decimal valor_gasto
      }
    `);

    document.getElementById('erd').innerHTML = svg;

    document.querySelectorAll('#erd svg .node').forEach(node => {
      const firstPath = node.querySelector('path[d]');
      if (!firstPath) return;
      const d = firstPath.getAttribute('d');
      const nums = d.match(/-?[\d.]+/g)?.map(Number);
      if (!nums || nums.length < 8) return;
      const xs = [nums[0], nums[2], nums[4], nums[6]];
      const ys = [nums[1], nums[3], nums[5], nums[7]];
      const x = Math.min(...xs), y = Math.min(...ys);
      const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', x); rect.setAttribute('y', y);
      rect.setAttribute('width', w); rect.setAttribute('height', h);
      rect.setAttribute('rx', '6');
      for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
        if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
      }
      firstPath.replaceWith(rect);
    });

    document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
      p.setAttribute('stroke', 'none');
    });
  </script>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.dataset.bsTheme === 'dark';
      html.dataset.bsTheme = isDark ? 'light' : 'dark';
      document.getElementById('themeIcon').className = isDark ? 'bi bi-circle-half' : 'bi bi-moon-stars';
      localStorage.setItem('theme', html.dataset.bsTheme);
    }

    // Restore saved theme
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.dataset.bsTheme = saved;
      document.getElementById('themeIcon').className = saved === 'dark' ? 'bi bi-moon-stars' : 'bi bi-circle-half';
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.dataset.bsTheme = 'dark';
      document.getElementById('themeIcon').className = 'bi bi-moon-stars';
    }
  </script>
</body>
</html>
